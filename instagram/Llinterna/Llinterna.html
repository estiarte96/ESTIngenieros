<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Soporte Llinterna – EST Ingenieros</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Soporte para linterna impreso en 3D. Adaptable a manillares y cascos.">
    <meta property="og:type" content="product">
    <meta property="og:title" content="Soporte Llinterna – EST Ingenieros">
    <meta property="og:image" content="/instagram/Llinterna/Images/1.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --fg: #111;
            --muted: #666;
            --line: #eee;
            --bg: #fff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Montserrat, system-ui, sans-serif;
            color: var(--fg);
            background: var(--bg);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .product {
            display: grid;
            grid-template-columns: 1.1fr .9fr;
            gap: 24px;
            padding: 28px 0;
        }

        .gallery-main {
            position: relative;
        }

        .gallery-main img {
            width: 100%;
            border-radius: 16px;
            object-fit: cover;
            aspect-ratio: 4/3;
            background: #f6f6f6;
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 999px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 20px;
        }

        .nav.prev {
            left: 8px;
        }

        .nav.next {
            right: 8px;
        }

        .thumbs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .thumbs .thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            opacity: .7;
            border: 1px solid var(--line);
        }

        .thumbs .thumb.is-active {
            opacity: 1;
            outline: 2px solid #1b6e3a;
        }

        .product-info .title {
            font-size: 28px;
            margin: 0 0 6px;
        }

        .product-info .subtitle {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 16px;
        }

        .chip {
            display: inline-block;
            padding: 4px 8px;
            border: 1px solid var(--line);
            border-radius: 999px;
            margin-right: 6px;
            font-size: 12px;
        }

        .desc {
            color: var(--muted);
            margin-bottom: 14px;
        }

        .price-block {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
        }

        .price {
            font-size: 22px;
            font-weight: 600;
            color: #1b6e3a;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            text-align: center;
            border: 1px solid var(--line);
            background: var(--bg);
        }

        .btn.primary {
            background: #1b6e3a;
            color: #fff;
            border: none;
            box-shadow: 0 4px 12px rgba(27, 110, 58, 0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }

        @media (max-width:880px) {
            .product {
                grid-template-columns: 1fr;
                padding-top: 10px;
            }

            .gallery-main img {
                aspect-ratio: 1/1;
            }

            .product-info .title {
                font-size: 24px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Product Footer Nav & Related */
        .product-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0 20px;
            border-top: 1px solid var(--line);
            margin-top: 40px;
        }

        .product-nav a {
            font-weight: 600;
            font-size: 14px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .product-nav a:hover {
            color: #1b6e3a;
        }

        .related-section {
            padding: 0 0 40px;
        }

        .related-section h3 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .related-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .related-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .related-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .related-card-info {
            padding: 12px;
            text-align: center;
        }

        .related-card-info h4 {
            font-size: 13px;
            margin: 0;
            color: var(--fg);
        }

        @media (max-width: 600px) {
            .related-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <nav class="wrap" style="padding-bottom: 0;">
        <a href="../index.html"
            style="display: inline-flex; align-items: center; gap: 8px; font-weight: 600; color: var(--fg); font-size: 14px;">
            <i class="fa fa-arrow-left"></i> Volver al Catálogo
        </a>
    </nav>

    <main class="wrap">
        <article class="product" itemscope itemtype="https://schema.org/Product">
            <section class="gallery">
                <div class="gallery-main">
                    <button class="nav prev" aria-label="Anterior">‹</button>
                    <img decoding="async" loading="lazy" id="img-main" src="Images/1.jpg" alt="Soporte Llinterna" itemprop="image">
                    <button class="nav next" aria-label="Siguiente">›</button>
                </div>
                <div class="thumbs">
                    <img decoding="async" loading="lazy" class="thumb is-active" src="Images/1.jpg" alt="Vista 1">
                </div>
            </section>

            <section class="product-info">
                <h1 class="title" itemprop="name">Soporte Llinterna</h1>
                <h2 class="subtitle">Material: <span class="chip">PLA</span> • Uso: <strong>Soporte Iluminación</strong>
                </h2>
                <p class="desc" itemprop="description">Soporte universal para linterna, fácil de instalar y muy
                    resistente.</p>
                <div class="price-block" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
                    <span class="price" itemprop="price" content="12">12 €</span>
                </div>
                <div class="actions">
                    <a class="btn primary"
                        href="https://wa.me/34937525129?text=Hola,%20estoy%20interesado%20en%20el%20Soporte%20Llinterna"
                        target="_blank">Pedir por WhatsApp</a>
                    <a class="btn" href="../index.html">Volver al catálogo</a>
                </div>
            </section>
        </article>

        <div class="product-nav">
            <a href="../GarminMount/GarminMount.html" class="prev-prod"><i class="fa fa-chevron-left"></i>
                Anterior</a>
            <a href="../PortaBido/PortaBido.html" class="next-prod">Siguiente <i class="fa fa-chevron-right"></i></a>
        </div>

        <section class="related-section">
            <h3>Más Productos</h3>
            <div class="related-grid">
                <!-- Se carga dinámicamente -->
            </div>
        </section>

    </main>

    <script src="../js/related.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.getElementById('img-main');
            const thumbs = Array.from(document.querySelectorAll('.thumbs .thumb'));
            let idx = 0;
            function show(i) {
                if (thumbs.length <= 1) return;
                idx = (i + thumbs.length) % thumbs.length;
                main.src = thumbs[idx].src;
                thumbs.forEach(t => t.classList.remove('is-active'));
                thumbs[idx].classList.add('is-active');
            }
            thumbs.forEach((t, i) => t.addEventListener('click', () => show(i)));
            document.querySelector('.nav.prev').addEventListener('click', () => show(idx - 1));
            document.querySelector('.nav.next').addEventListener('click', () => show(idx + 1));
            if (thumbs.length <= 1) {
                document.querySelectorAll('.nav').forEach(n => n.style.display = 'none');
            }
        });
    </script>
</body>

</html>
